version: '3.8'

services:
  # 1. BACKEND API
  api:
    build:
      context: ./Server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Connection String đã khớp password bên dưới -> OK
      - ConnectionStrings__DefaultConnection=Server=db;Database=FinanceJarDb;User=root;Password=0944138963Pt@;
      - GeminiKey=AIzaSyBBMhyMob-NtTRRiGgJLbng7zeWBmSk7OY
      - Jwt__Key=ThisIsASecretKeyForJwtTokenGeneration123!
      - Jwt__Issuer=FinanceJarServer
      - Jwt__Audience=FinanceJarClient
    depends_on:
      - db
      - qdrant

  # 2. MYSQL DATABASE (Đã sửa comment cho đúng)
  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=0944138963Pt@
      - MYSQL_DATABASE=FinanceJarDb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql  # 👈 Ở đây dùng tên mysql_data

  # 3. QDRANT (Vector DB)
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

# 👇 KHAI BÁO VOLUME (Phải khớp với tên bên trên)
volumes:
  mysql_data:    # 👈 ĐÃ SỬA: Khớp với service db
  qdrant_data: