version: '3.8'

services:
  # 1. BACKEND API
  api:
    build:
      context: ./Server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=FinanceJarDb;User Id=sa;Password=0944138963Pt@;TrustServerCertificate=True;
      - GeminiKey=AIzaSyBBMhyMob-NtTRRiGgJLbng7zeWBmSk7OY
      - Jwt__Key=ThisIsASecretKeyForJwtTokenGeneration123!
      - Jwt__Issuer=FinanceJarServer
      - Jwt__Audience=FinanceJarClient
    depends_on:
      - db
      - qdrant

  # 2. SQL SERVER
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=0944138963Pt@
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  # 3. QDRANT (Vector DB)
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  sql_data:
  qdrant_data: